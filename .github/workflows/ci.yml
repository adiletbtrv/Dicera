name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dicera_user
          POSTGRES_PASSWORD: dicera_password
          POSTGRES_DB: dicera_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://dicera_user:dicera_password@localhost:5432/dicera_test_db
      JWT_SECRET: ci_dummy_secret_key_for_testing_32chars
      JWT_EXPIRY: 7d
      PORT: "3001"
      CORS_ORIGIN: http://localhost:3000
      AI_PROVIDER: gemini
      GEMINI_API_KEY: dummy-gemini-key-ci
      OPENAI_API_KEY: sk-dummy-openai-key-ci
      HUGGINGFACE_API_KEY: dummy-huggingface-key-ci

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build & Typecheck (via Turborepo)
        run: npx turbo run build typecheck

      - name: Run Database Migrations
        run: npm run db:migrate -w apps/api

      - name: API Tests
        run: npm run test -w apps/api

      - name: Frontend Tests
        run: npm run test -w apps/web
