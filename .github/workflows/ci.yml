name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build & Typecheck (via Turborepo)
        run: npx turbo run build typecheck

      - name: API Tests
        run: npm run test -w apps/api

      - name: Frontend Tests
        run: npm run test -w apps/web
