<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A full-featured D&D 5e platform: character builder, spell compendium, bestiary, encounter builder, campaign manager, and AI assistants." />
    <title>Dicera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Apply saved theme instantly to prevent flash
      (function(){
        var t = localStorage.getItem('dnd-theme');
        if (t === 'light') { document.documentElement.classList.remove('dark'); }
        else if (t === 'dark') { document.documentElement.classList.add('dark'); }
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) { document.documentElement.classList.add('dark'); }
      })();
    </script>
  </body>
</html>
